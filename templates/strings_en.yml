# ── English Report Strings ─────────────────────────────────────────────────
# All text used in PDF / PPTX executive reports.
# Use {company_name}, {date}, {version}, {author}, etc. as placeholders.
# Keep keys in sync with strings_tr.yml.

cover:
  title: "IT Service Management & Information Security Report"
  subtitle: "GLPI ITSM Implementation with ISO 27001 Alignment"
  prepared_for: "Prepared for {company_name}"
  prepared_by: "Prepared by: {author}"
  date_label: "Date: {date}"
  version_label: "Version: {version}"
  confidentiality: "CONFIDENTIAL — For internal use only"
  disclaimer: "This document contains proprietary information belonging to {company_name}. Unauthorized distribution is prohibited."

toc:
  title: "Table of Contents"
  executive_summary: "Executive Summary"
  scope: "Scope & Objectives"
  system_overview: "System Overview"
  configurations: "GLPI Configurations"
  isms: "Information Security Management"
  network: "Network & Infrastructure"
  iso27001: "ISO 27001 Compliance"
  value: "Business Value & ROI"
  cost: "Cost Analysis"
  conclusion: "Conclusion & Recommendations"
  appendix: "Appendix"

executive_summary:
  title: "Executive Summary"
  intro: >
    This report presents the IT Service Management (ITSM) implementation
    for {company_name} using GLPI, an open-source ITIL-compliant platform.
    The system has been configured to address asset management, help desk
    operations, and information security requirements aligned with
    ISO 27001:2022 standards.
  highlights_title: "Key Highlights"
  highlight_itsm: "Full ITIL v4 compliant service desk with {sla_count}-tier SLA structure"
  highlight_itam: "Comprehensive IT asset management covering {asset_type_count} asset categories"
  highlight_isms: "ISO 27001:2022 alignment with {coverage_pct}% Annex A control coverage"
  highlight_rbac: "Role-based access control with {profile_count} security profiles"
  highlight_auto: "Automated workflows for incident management and user lifecycle"
  conclusion: >
    The implementation provides {company_name} with an enterprise-grade
    IT management platform that supports both day-to-day operations
    and compliance requirements at a fraction of the cost of commercial
    alternatives.

scope:
  title: "Scope & Objectives"
  intro: >
    The scope of this implementation covers all IT operations
    for {company_name}, including service management, asset tracking,
    and information security controls.
  objectives_title: "Project Objectives"
  obj_centralize: "Centralize IT service requests through a single platform"
  obj_asset: "Establish a complete hardware and software asset inventory"
  obj_sla: "Implement measurable SLA targets for service delivery"
  obj_isms: "Build an information security management framework"
  obj_compliance: "Achieve alignment with ISO 27001:2022 requirements"
  obj_reporting: "Enable data-driven IT decision making through reporting"
  coverage_title: "Coverage Areas"
  coverage_helpdesk: "Help desk and incident management"
  coverage_asset: "IT asset management (ITAM)"
  coverage_change: "Change and problem management"
  coverage_security: "Information security management (ISMS)"
  coverage_knowledge: "Knowledge base management"
  coverage_reporting: "Reporting and analytics"

system:
  title: "System Overview"
  intro: >
    GLPI (Gestionnaire Libre de Parc Informatique) is deployed as the
    central ITSM platform for {company_name}. The system provides
    integrated help desk, asset management, and administrative capabilities.
  architecture_title: "System Architecture"
  arch_platform: "Platform: GLPI {glpi_version} (Open Source, GPL v3)"
  arch_database: "Database: MariaDB / MySQL with automated backups"
  arch_hosting: "Hosting: On-premise Docker deployment with container isolation"
  arch_access: "Access: Web-based interface accessible from all company devices"
  arch_agent: "Agent: GLPI Agent for automated hardware/software inventory"
  arch_api: "API: RESTful API for integrations and automation"
  users_title: "User Structure"
  users_intro: >
    The system is configured with a role-based access control (RBAC)
    model that enforces the principle of least privilege. Each user
    is assigned a profile that determines their access level.
  profiles_title: "Security Profiles"

configurations:
  title: "GLPI Configurations"
  intro: >
    The following sections detail the specific configurations applied
    to GLPI for {company_name}. All settings follow ITIL best practices
    and ISO 27001 security requirements.
  categories_title: "Service Categories"
  categories_intro: >
    Ticket categories are organized in a hierarchical structure that
    maps to ITIL service categories and supports automatic routing
    to the appropriate support group.
  sla_title: "Service Level Agreements"
  sla_intro: >
    SLA targets are defined based on ITIL v4 global standards and
    adjusted for the operational capacity of {company_name}.
  sla_header_priority: "Priority"
  sla_header_response: "Response"
  sla_header_resolution: "Resolution"
  sla_header_examples: "Example Scenarios"
  assets_title: "Asset Management"
  assets_intro: >
    The asset management module tracks all hardware and software
    throughout their complete lifecycle, from procurement to disposal.
  asset_states_title: "Asset Lifecycle States"
  asset_types_title: "Tracked Asset Types"
  locations_title: "Location Hierarchy"
  locations_intro: >
    Physical locations are organized in a zone-based hierarchy
    for accurate asset tracking and physical security management.

isms:
  title: "Information Security Management"
  intro: >
    {company_name} operates an Information Security Management System
    (ISMS) integrated with GLPI. The framework aligns with ISO 27001:2022
    and provides documented policies, procedures, and technical controls.
  framework_title: "ISMS Framework"
  framework_intro: >
    The ISMS framework consists of policies, procedures, and work
    instructions organized in a three-tier documentation hierarchy.
  policies_title: "Security Policies"
  policy_main: "ISMS-POL-001 — Information Security Policy"
  policy_password: "ISMS-POL-002 — Password and Authentication Policy"
  procedures_title: "Security Procedures"
  proc_onboarding: "ISMS-PRO-001 — Incident Management Procedure"
  proc_lifecycle: "ISMS-PRO-002 — User Lifecycle Management Procedure"
  password_title: "Password Policy"
  password_intro: >
    Authentication controls enforce strong password requirements
    in compliance with ISO 27001 A.5.17 and A.8.5.
  password_min_length: "Minimum length: {min_length} characters"
  password_complexity: "Complexity: uppercase, lowercase, numbers, and symbols required"
  password_expiry: "Expiry: every {expiry_days} days with {warning_days}-day advance warning"
  password_lockout: "Lockout: after {max_attempts} failed attempts for {lockout_minutes} minutes"
  password_first_login: "First login: mandatory password change"
  rbac_title: "Access Control (RBAC)"
  rbac_intro: >
    Role-based access control enforces the segregation of duties
    principle. Users are assigned the minimum permissions required
    for their role.

network:
  title: "Network & Infrastructure"
  intro: >
    This section documents the network architecture and infrastructure
    components managed through GLPI for {company_name}.
  topology_title: "Network Topology"
  topology_intro: >
    The network is segmented using VLANs to isolate critical
    systems from general user traffic and guest access.
  vlan_title: "VLAN Segmentation"
  vlan_header_id: "VLAN ID"
  vlan_header_name: "Name"
  vlan_header_subnet: "Subnet"
  vlan_header_purpose: "Purpose"
  equipment_title: "Network Equipment"
  equipment_intro: >
    All network equipment is inventoried in GLPI with configuration
    records, firmware versions, and maintenance schedules.

iso27001:
  title: "ISO 27001:2022 Compliance"
  intro: >
    This section presents the mapping between {company_name}'s GLPI
    implementation and the ISO 27001:2022 Annex A control framework.
    Coverage analysis is based on the control definitions in the
    current configuration.
  summary_title: "Coverage Summary"
  summary_intro: >
    The following table shows the current compliance status across
    all four control categories defined in ISO 27001:2022.
  header_category: "Category"
  header_total: "Total"
  header_covered: "Covered"
  header_partial: "Partial"
  header_gaps: "Gaps"
  header_coverage: "Coverage"
  organizational: "Organizational Controls (A.5)"
  people: "People Controls (A.6)"
  physical: "Physical Controls (A.7)"
  technological: "Technological Controls (A.8)"
  overall_label: "Overall Compliance"
  covered_title: "Covered Controls"
  covered_intro: >
    The following controls are fully addressed by the current
    GLPI configuration and supporting ISMS documentation.
  gaps_title: "Gap Analysis"
  gaps_intro: >
    The following controls are not yet covered or only partially
    addressed. These represent areas for improvement in the
    next implementation phase.
  recommendations_title: "Recommendations"
  rec_phase1: "Phase 1: Address high-priority organizational controls (A.5.4 — A.5.8)"
  rec_phase2: "Phase 2: Implement people controls for training and awareness (A.6.3, A.6.6 — A.6.8)"
  rec_phase3: "Phase 3: Strengthen physical security controls (A.7.2 — A.7.14)"
  rec_phase4: "Phase 4: Deploy remaining technological controls for full coverage"

value:
  title: "Business Value & ROI"
  intro: >
    This section quantifies the business value delivered by the
    GLPI ITSM implementation for {company_name}.
  benefits_title: "Key Benefits"
  benefit_visibility: "Complete IT asset visibility across all departments"
  benefit_response: "Faster incident response with measured SLA performance"
  benefit_compliance: "Documented compliance framework for ISO 27001 certification"
  benefit_cost: "Significant cost savings compared to commercial ITSM solutions"
  benefit_automation: "Automated workflows reducing manual IT administration"
  benefit_reporting: "Data-driven decision making through operational reports"
  comparison_title: "Commercial Alternative Comparison"
  comparison_intro: >
    The open-source GLPI platform delivers comparable functionality
    to leading commercial ITSM solutions at a significantly lower
    total cost of ownership.
  comparison_header_feature: "Feature"
  comparison_header_glpi: "GLPI (Open Source)"
  comparison_header_commercial: "Commercial ITSM"
  comparison_license: "License Cost"
  comparison_license_glpi: "Free (GPL v3)"
  comparison_license_commercial: "$30 — $150 per agent/month"
  comparison_itam: "Asset Management"
  comparison_itam_glpi: "Included (with agent)"
  comparison_itam_commercial: "Usually separate module"
  comparison_isms: "ISO 27001 Integration"
  comparison_isms_glpi: "Via configuration-as-code"
  comparison_isms_commercial: "Varies by vendor"

cost:
  title: "Cost Analysis"
  intro: >
    The total cost of ownership for the GLPI implementation
    includes infrastructure, deployment, and ongoing maintenance.
  infrastructure_title: "Infrastructure Costs"
  deployment_title: "Deployment Costs"
  maintenance_title: "Annual Maintenance"
  total_title: "Total First-Year Cost"
  savings_title: "Annual Savings vs. Commercial"
  savings_intro: >
    Compared to a commercial ITSM solution with equivalent features,
    {company_name} realizes substantial annual savings.

conclusion:
  title: "Conclusion & Recommendations"
  intro: >
    The GLPI ITSM implementation provides {company_name} with a
    comprehensive IT management platform that addresses service
    delivery, asset tracking, and information security requirements.
  achievements_title: "Key Achievements"
  achievement_1: "Fully operational ITIL-compliant service desk"
  achievement_2: "Complete IT asset inventory with lifecycle management"
  achievement_3: "ISO 27001-aligned security framework with documented controls"
  achievement_4: "Automated workflows for incident, change, and user management"
  achievement_5: "Cost-effective solution with significant savings over commercial alternatives"
  next_steps_title: "Recommended Next Steps"
  next_1: "Expand ISO 27001 control coverage to additional Annex A areas"
  next_2: "Implement automated vulnerability scanning integration"
  next_3: "Deploy GLPI Agent to all endpoint devices for real-time inventory"
  next_4: "Establish regular access review cycles (quarterly)"
  next_5: "Schedule internal audit for ISO 27001 pre-certification readiness"
  next_6: "Create user training program for the GLPI platform"
  closing: >
    With continued investment in these areas, {company_name} will
    be well-positioned to pursue formal ISO 27001 certification and
    maintain a mature, auditable IT management environment.

executive_summary:
  title: "Yonetici Ozeti"
  intro: >
    Bu rapor, {company_name} icin acik kaynakli ve ITIL uyumlu bir
    platform olan GLPI kullanilarak gerceklestirilen BT Hizmet Yonetimi
    (ITSM) uygulamasini sunmaktadir. Sistem; varlik yonetimi, yardim
    masasi operasyonlari ve ISO 27001:2022 standartlarina uyumlu bilgi
    guvenligi gereksinimlerini karsilayacak sekilde yapilandirilmistir.
  highlights_title: "Temel Basarilar"
  highlight_itsm: "{sla_count} katmanli SLA yapisina sahip tam ITIL v4 uyumlu hizmet masasi"
  highlight_itam: "{asset_type_count} varlik kategorisini kapsayan kapsamli BT varlik yonetimi"
  highlight_isms: "Ek A kontrol kapsaminin %{coverage_pct} oraninda karsilandigi ISO 27001:2022 uyumu"
  highlight_rbac: "{profile_count} guvenlik profili ile rol tabanli erisim kontrolu"
  highlight_auto: "Olay yonetimi ve kullanici yasam dongusu icin otomatik is akislari"
  conclusion: >
    Bu uygulama, {company_name} sirketine ticari alternatiflerin maliyetinin
    cok altinda, hem gunluk operasyonlari hem de uyumluluk gereksinimlerini
    destekleyen kurumsal duzeyde bir BT yonetim platformu saglamaktadir.

scope:
  title: "Kapsam ve Hedefler"
  intro: >
    Bu uygulamanin kapsami, hizmet yonetimi, varlik takibi ve bilgi
    guvenligi kontrolleri dahil olmak uzere {company_name} sirketinin
    tum BT operasyonlarini icerir.
  objectives_title: "Proje Hedefleri"
  obj_centralize: "BT hizmet taleplerini tek bir platform uzerinden merkezilestirmek"
  obj_asset: "Eksiksiz bir donanim ve yazilim varlik envanteri olusturmak"
  obj_sla: "Hizmet sunumu icin olculebilir SLA hedefleri belirlemek"
  obj_isms: "Bilgi guvenligi yonetim cercevesi olusturmak"
  obj_compliance: "ISO 27001:2022 gereksinimlerine uyum saglamak"
  obj_reporting: "Raporlama araciligiyla veriye dayali BT karar alma surecini etkinlestirmek"
  coverage_title: "Kapsam Alanlari"
  coverage_helpdesk: "Yardim masasi ve olay yonetimi"
  coverage_asset: "BT varlik yonetimi (ITAM)"
  coverage_change: "Degisiklik ve problem yonetimi"
  coverage_security: "Bilgi guvenligi yonetimi (BGYS)"
  coverage_knowledge: "Bilgi bankasi yonetimi"
  coverage_reporting: "Raporlama ve analitik"

system:
  title: "Sistem Genel Bakisi"
  intro: >
    GLPI (Gestionnaire Libre de Parc Informatique), {company_name}
    sirketinin merkezi ITSM platformu olarak konuslandirilmistir.
    Sistem; entegre yardim masasi, varlik yonetimi ve yonetimsel
    yetenekler sunmaktadir.
  architecture_title: "Sistem Mimarisi"
  arch_platform: "Platform: GLPI {glpi_version} (Acik Kaynak, GPL v3)"
  arch_database: "Veritabani: Otomatik yedekleme ile MariaDB / MySQL"
  arch_hosting: "Barindirma: Konteyner izolasyonlu yerel Docker kurulumu"
  arch_access: "Erisim: Tum sirket cihazlarindan erisilebilen web tabanli arayuz"
  arch_agent: "Ajan: Otomatik donanim/yazilim envanteri icin GLPI Agent"
  arch_api: "API: Entegrasyon ve otomasyon icin RESTful API"
  users_title: "Kullanici Yapisi"
  users_intro: >
    Sistem, en az yetki ilkesini uygulayan rol tabanli erisim kontrolu
    (RBAC) modeli ile yapilandirilmistir. Her kullaniciya erisim
    duzeyini belirleyen bir profil atanir.
  profiles_title: "Guvenlik Profilleri"

configurations:
  title: "GLPI Yapilandirmalari"
  intro: >
    Asagidaki bolumler, {company_name} icin GLPI'ye uygulanan ozel
    yapilandirmalari detaylandirmaktadir. Tum ayarlar ITIL en iyi
    uygulamalari ve ISO 27001 guvenlik gereksinimlerini takip eder.
  categories_title: "Hizmet Kategorileri"
  categories_intro: >
    Talep kategorileri, ITIL hizmet kategorileriyle eslesen ve uygun
    destek grubuna otomatik yonlendirmeyi destekleyen hiyerarsik bir
    yapida duzenlenmistir.
  sla_title: "Hizmet Seviyesi Anlasmalari"
  sla_intro: >
    SLA hedefleri, ITIL v4 kuresel standartlarina dayanmakta olup
    {company_name} sirketinin operasyonel kapasitesine gore
    uyarlanmistir.
  sla_header_priority: "Oncelik"
  sla_header_response: "Yanit"
  sla_header_resolution: "Cozum"
  sla_header_examples: "Ornek Senaryolar"
  assets_title: "Varlik Yonetimi"
  assets_intro: >
    Varlik yonetimi modulu, tum donanim ve yazilimlari satin almadan
    elden cikarmaya kadar tum yasam dongusu boyunca takip eder.
  asset_states_title: "Varlik Yasam Dongusu Durumlari"
  asset_types_title: "Takip Edilen Varlik Turleri"
  locations_title: "Konum Hiyerarsisi"
  locations_intro: >
    Fiziksel konumlar, dogru varlik takibi ve fiziksel guvenlik
    yonetimi icin bolge tabanli bir hiyerarsik yapida duzenlenmistir.

isms:
  title: "Bilgi Guvenligi Yonetimi"
  intro: >
    {company_name}, GLPI ile entegre bir Bilgi Guvenligi Yonetim
    Sistemi (BGYS) isletmektedir. Cerceve, ISO 27001:2022 ile uyumlu
    olup belgelenmis politikalar, prosedurler ve teknik kontroller
    icermektedir.
  framework_title: "BGYS Cercevesi"
  framework_intro: >
    BGYS cercevesi; uc katmanli bir dokumantasyon hiyerarsisinde
    duzenlenmis politikalar, prosedurler ve calisma talimatlari
    icerir.
  policies_title: "Guvenlik Politikalari"
  policy_main: "BGYS-POL-001 — Bilgi Guvenligi Politikasi"
  policy_password: "BGYS-POL-002 — Parola ve Kimlik Dogrulama Politikasi"
  procedures_title: "Guvenlik Prosedurleri"
  proc_onboarding: "BGYS-PRO-001 — Olay Yonetimi Proseduru"
  proc_lifecycle: "BGYS-PRO-002 — Kullanici Yasam Dongusu Yonetimi Proseduru"
  password_title: "Parola Politikasi"
  password_intro: >
    Kimlik dogrulama kontrolleri, ISO 27001 A.5.17 ve A.8.5
    uyumlu olarak guclu parola gereksinimlerini zorunlu kilar.
  password_min_length: "Minimum uzunluk: {min_length} karakter"
  password_complexity: "Karmasiklik: buyuk harf, kucuk harf, rakam ve sembol zorunlu"
  password_expiry: "Sure dolumu: her {expiry_days} gunde bir, {warning_days} gun onceden uyari"
  password_lockout: "Kilitleme: {max_attempts} basarisiz denemeden sonra {lockout_minutes} dakika"
  password_first_login: "Ilk giris: zorunlu parola degisikligi"
  rbac_title: "Erisim Kontrolu (RBAC)"
  rbac_intro: >
    Rol tabanli erisim kontrolu, gorevler ayrimi ilkesini zorunlu
    kilar. Kullanicilara rolleri icin gereken minimum yetkiler atanir.

network:

  title: "ISO 27001:2022 Uyumlulugu"
  intro: >
    Bu bolum, {company_name} sirketinin GLPI uygulamasi ile ISO
    27001:2022 Ek A kontrol cercevesi arasindaki eslesmeyi sunmaktadir.
    Kapsam analizi, mevcut yapilandirmadaki kontrol tanimlarina
    dayanmaktadir.
  summary_title: "Kapsam Ozeti"
  summary_intro: >

  overall_label: "Genel Uyumluluk"
  covered_title: "Karsilanan Kontroller"
  covered_intro: >
    Asagidaki kontroller, mevcut GLPI yapilandirmasi ve destekleyici
    BGYS dokumantasyonu tarafindan tam olarak karsilanmaktadir.
  gaps_title: "Bosluk Analizi"
  gaps_intro: >
    Asagidaki kontroller henuz karsilanmamis veya yalnizca kismi

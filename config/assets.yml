# ── Asset Management Configuration ────────────────────────────

asset_states:
  - name: "In Use"
    description: "Assigned to a user or department"
  - name: "In Stock"
    description: "Available in IT inventory"
  - name: "Faulty"
    description: "Needs repair or replacement"
  - name: "Under Repair"
    description: "Sent for maintenance"
  - name: "On Loan"
    description: "Temporarily assigned"
  - name: "Decommissioned"
    description: "End of life, pending disposal"
  - name: "Under Warranty"
    description: "Covered by manufacturer warranty"
  - name: "Delivered"
    description: "Received but not yet deployed"
  - name: "Pending Return"
    description: "Awaiting return from departing employee"
    isms_ref: "ISMS-PRO-002"
  - name: "Under Audit"
    description: "Reserved for ISO audit review"

computer_types:
  - "Notebook"
  - "Desktop"
  - "Server"
  - "Mini PC"
  - "All-in-One"
  - "Workstation"
  - "Tablet"

document_categories:
  - "Contracts"
  - "Licenses"
  - "Invoices"
  - "Network Topology"
  - "Procedures"
  - "Technical Manuals"
  - "Warranty Documents"
  - "Insurance"
  - "Training Materials"
  - "Meeting Notes"
  - "ISMS Policies"
  - "ISMS Procedures"
  - "Audit Reports"

software_categories:

# ── ITIL Service Categories ───────────────────────────────────
# Hierarchical category structure for the helpdesk.
# Each category can have sub-categories and a default priority.

categories:
  - name: "Incident Report"
    type: "incident"
    subcategories:
      - name: "Network / Internet"
        default_priority: "high"
        group: "Network Management"
      - name: "Computer"
        default_priority: "normal"
        group: "End User Support"
      - name: "Printer"
        default_priority: "normal"
        group: "End User Support"
      - name: "Phone / VoIP"
        default_priority: "normal"
        group: "Network Management"
      - name: "Server"
        default_priority: "critical"
        group: "System Administration"
      - name: "Software (MES/ERP)"
        default_priority: "high"
        group: "Production IT"

  - name: "Service Request"
    type: "request"
    subcategories:
      - name: "New User Account"
        default_priority: "normal"
        group: "System Administration"
      - name: "Password Reset"
        default_priority: "low"
        group: "End User Support"
      - name: "Software Installation"
        default_priority: "low"
        group: "End User Support"
      - name: "Hardware Request"
        default_priority: "low"
        group: "IT Department"
      - name: "Permission / Access Request"
        default_priority: "normal"
        group: "Security"
      - name: "Email Issue"
        default_priority: "normal"
        group: "System Administration"
      - name: "Password Policy Violation"
        default_priority: "high"
        group: "Security"

  - name: "Network Equipment"
    type: "incident"
    subcategories:
      - name: "Router"
        default_priority: "high"
        group: "Network Management"
      - name: "Switch"
        default_priority: "high"
        group: "Network Management"
      - name: "Access Point"
        default_priority: "normal"
        group: "Network Management"
      - name: "Firewall"
        default_priority: "high"
        group: "Security"

  - name: "Information Security"
    type: "incident"
    isms_ref: "ISMS-POL-001"
    subcategories:
      - name: "Security Incident Report"
        default_priority: "critical"
        group: "Security"
      - name: "Access Violation"
        default_priority: "critical"
        group: "Security"
      - name: "Policy Violation"
        default_priority: "high"
        group: "Security"
      - name: "Vulnerability Report"
        default_priority: "high"
        group: "Security"
      - name: "Data Breach Report"
        default_priority: "critical"
        group: "Security"

  - name: "User Lifecycle"
    type: "request"
    isms_ref: "ISMS-PRO-002"
    subcategories:
      - name: "New Employee Onboarding"
        default_priority: "normal"
        group: "System Administration"
      - name: "Employee Offboarding"
        default_priority: "normal"
        group: "System Administration"
      - name: "Position / Department Change"
        default_priority: "normal"
        group: "System Administration"
      - name: "Access Rights Review"
        default_priority: "normal"
        group: "Security"
      - name: "Temporary / Intern Account"
        default_priority: "normal"
        group: "System Administration"
